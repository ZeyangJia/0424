<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 后台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #001529;
            color: #fff;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }
        .header button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .header button:hover {
            border-color: #fff;
        }
        .content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
        }
        .card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin 后台管理系统</h1>
        <button id="logoutBtn">退出登录</button>
    </div>
    <div class="content">
        <div class="card">
            <h2>欢迎登录</h2>
            <p>您已成功进入 Admin 后台。后续功能将逐步扩展。</p>
        </div>
    </div>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', function() {
            fetch('/api/logout', { method: 'POST' })
                .then(function() {
                    window.location.href = '/';
                })
                .catch(function() {
                    window.location.href = '/';
                });
        });
    </script>
</body>
</html>
