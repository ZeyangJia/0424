<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 登录</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 22px;
            color: #333;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #1890ff;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1890ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background-color: #40a9ff;
        }
        button:active {
            background-color: #096dd9;
        }
        .error {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Admin 登录</h1>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit">登录</button>
            <div class="error" id="errorMsg"></div>
        </form>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                errorMsg.textContent = '';

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    errorMsg.textContent = '请输入用户名和密码';
                    return;
                }

                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                })
                .then(function(response) {
                    return response.json().then(function(data) {
                        return { ok: response.ok, data: data };
                    });
                })
                .then(function(result) {
                    if (result.ok && result.data.success) {
                        window.location.href = '/admin';
                    } else {
                        errorMsg.textContent = result.data.message || '用户名或密码错误';
                    }
                })
                .catch(function() {
                    errorMsg.textContent = '网络错误，请稍后重试';
                });
            });
        })();
    </script>
</body>
</html>
